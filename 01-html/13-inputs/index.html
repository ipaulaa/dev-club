<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Inputs</title>
  </head>
  <body>
    <input autocomplete="name" placeholder="Enter your name" />
    <input value="Paula" disabled />
    <input value="Paula" readonly />

    <label>Name: <input /></label>

    <label for="name">Name:</label>
    <input id="name" />

    <input autofocus />
  </body>
</html>
